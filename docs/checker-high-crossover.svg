<svg xmlns="http://www.w3.org/2000/svg" width="820" height="430"
     viewBox="0 0 820 430" role="img"
     aria-labelledby="title description">
  <title id="title">Historical Checker High Tensor speedup by BVH leaf size</title>
  <desc id="description">
    Tensor is slower below a maximum leaf size of 64 to 128 and faster at larger
    leaves in a historical RTX 3050 Ti test whose raw samples were not retained.
    Coherent speedup reaches 1.214 at 256 triangles; packet-shuffled speedup
    reaches 1.175.
  </desc>
  <rect width="820" height="430" fill="#0d1117"/>
  <text x="410" y="27" text-anchor="middle" fill="#f0f6fc"
        font-family="system-ui, sans-serif" font-size="18" font-weight="600">
    Historical Checker High: matched CUDA median / Tensor median
  </text>

  <g stroke="#30363d" stroke-width="1">
    <line x1="80" y1="340" x2="740" y2="340"/>
    <line x1="80" y1="302.5" x2="740" y2="302.5"/>
    <line x1="80" y1="227.5" x2="740" y2="227.5"/>
    <line x1="80" y1="152.5" x2="740" y2="152.5"/>
    <line x1="80" y1="77.5" x2="740" y2="77.5"/>
    <line x1="80" y1="40" x2="740" y2="40"/>
  </g>

  <line x1="80" y1="227.5" x2="740" y2="227.5"
        stroke="#f0f6fc" stroke-width="2" stroke-dasharray="7 6"/>
  <text x="735" y="218" text-anchor="end" fill="#f0f6fc"
        font-family="system-ui, sans-serif" font-size="12">
    crossover (1.0×)
  </text>

  <g fill="#8b949e" font-family="system-ui, sans-serif" font-size="12">
    <text x="68" y="344" text-anchor="end">0.85×</text>
    <text x="68" y="306.5" text-anchor="end">0.90×</text>
    <text x="68" y="231.5" text-anchor="end">1.00×</text>
    <text x="68" y="156.5" text-anchor="end">1.10×</text>
    <text x="68" y="81.5" text-anchor="end">1.20×</text>
    <text x="68" y="44" text-anchor="end">1.25×</text>

    <text x="100" y="365" text-anchor="middle">4</text>
    <text x="200" y="365" text-anchor="middle">8</text>
    <text x="300" y="365" text-anchor="middle">16</text>
    <text x="400" y="365" text-anchor="middle">32</text>
    <text x="500" y="365" text-anchor="middle">64</text>
    <text x="600" y="365" text-anchor="middle">128</text>
    <text x="700" y="365" text-anchor="middle">256</text>
    <text x="410" y="391" text-anchor="middle" fill="#c9d1d9"
          font-size="13">maximum triangles per leaf</text>
    <text x="18" y="190" text-anchor="middle" fill="#c9d1d9"
          font-size="13" transform="rotate(-90 18 190)">speedup</text>
  </g>

  <polyline fill="none" stroke="#58a6ff" stroke-width="3"
            points="100,263.5 200,271 300,277 400,255.25 500,206.5 600,109 700,67"/>
  <polyline fill="none" stroke="#f0883e" stroke-width="3"
            points="100,265 200,271 300,277.75 400,288.25 500,289.75 600,237.25 700,96.25"/>

  <g fill="#58a6ff">
    <circle cx="100" cy="263.5" r="4"/><circle cx="200" cy="271" r="4"/>
    <circle cx="300" cy="277" r="4"/><circle cx="400" cy="255.25" r="4"/>
    <circle cx="500" cy="206.5" r="4"/><circle cx="600" cy="109" r="4"/>
    <circle cx="700" cy="67" r="4"/>
  </g>
  <g fill="#f0883e">
    <circle cx="100" cy="265" r="4"/><circle cx="200" cy="271" r="4"/>
    <circle cx="300" cy="277.75" r="4"/><circle cx="400" cy="288.25" r="4"/>
    <circle cx="500" cy="289.75" r="4"/><circle cx="600" cy="237.25" r="4"/>
    <circle cx="700" cy="96.25" r="4"/>
  </g>

  <g font-family="system-ui, sans-serif" font-size="12">
    <line x1="215" y1="412" x2="245" y2="412" stroke="#58a6ff"
          stroke-width="3"/>
    <text x="253" y="416" fill="#c9d1d9">coherent primary rays</text>
    <line x1="440" y1="412" x2="470" y2="412" stroke="#f0883e"
          stroke-width="3"/>
    <text x="478" y="416" fill="#c9d1d9">packet-shuffled primary rays</text>
  </g>
</svg>
